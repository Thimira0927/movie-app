<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎬 Movie Search App</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🎬 Movie Search App</h1>

<div class="search-box">
<input type="text" id="movieInput" placeholder="Enter movie name">
<button onclick="searchMovie()">Search</button>
</div>

<div class="categories">
<button onclick="loadCategory('trending')">🔥 Trending</button>
<button onclick="loadCategory('popular')">⭐ Popular</button>
<button onclick="loadCategory('top')">🏆 Top Rated</button>
<button onclick="loadCategory('action')">💥 Action</button>
<button onclick="loadCategory('comedy')">😂 Comedy</button>
</div>

<h2>🔥 Trending Movies</h2>

<div class="slider">
<button class="scroll-btn left" onclick="scrollLeft()">❮</button>
<div id="trendingMovies" class="movie-row"></div>
<button class="scroll-btn right" onclick="scrollRight()">❯</button>
</div>

<h2>❤️ My Favorites</h2>
<div id="favoriteMovies" class="movie-row"></div>

<div id="loading" style="display:none;">Loading...</div>
<div id="error" class="error"></div>

<div id="movieResult"></div>

<div id="movieModal" class="modal">
<div class="modal-content">
<span class="close" onclick="closeModal()">&times;</span>
<div id="modalDetails"></div>
</div>
</div>

<script src="script.js"></script>
</body>
</html>
